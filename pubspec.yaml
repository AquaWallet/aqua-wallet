name: aqua
description: AQUA - Bitcoin & Layer 2 Wallet

publish_to: "none"

version: 0.4.0+228

environment:
  sdk: "3.4.4"
  flutter: 3.22.3

dependencies:
  # ---- ML Kit & Camera ----
  camera: ^0.10.0+4
  google_mlkit_text_recognition: ^0.6.0

  # ---- Core & Other Packages ----
  app_settings: ^5.1.1
  async: ^2.11.0
  bech32: ^0.2.2
  bip32: ^2.0.0
  bip39: ^1.0.6
  bolt11_decoder: ^1.0.2
  boltz: ^0.2.1
  chopper: ^7.4.0
  collection: ^1.17.1
  connectivity_plus: ^6.1.2
  convert: ^3.1.1
  crypto: ^3.0.3
  cupertino_icons: ^1.0.2
  decimal: ^2.3.3
  device_info_plus: ^11.1.1
  device_preview: ^1.1.0
  dio: ^5.3.2
  dotted_border: ^2.1.0
  encrypt: ^5.0.3
  envied: ^1.0.0
  ffi: ^2.0.2
  file_picker: ^8.0.0+1
  flutter:
    sdk: flutter
  flutter_client_sse: ^2.0.0
  flutter_file_saver: ^0.6.2
  flutter_hooks: ^0.20.5
  flutter_keyboard_visibility: ^6.0.0
  flutter_layout_grid: ^2.0.0
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.3.13
  flutter_riverpod: ^2.4.0
  flutter_rust_bridge: ^2.8.0
  flutter_secure_storage: ^9.0.0
  flutter_svg: ^2.0.7
  freezed_annotation: ^2.4.1
  go_router: ^14.2.7
  google_fonts: ^6.2.1
  hex: ^0.2.0
  hooks_riverpod: ^2.3.6
  http: ^0.13.6
  image_picker: ^1.0.1
  intl: any
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  json_annotation: ^4.8.1
  local_auth: ^2.1.8
  lottie: ^3.1.0
  mobile_scanner: ^4.0.1
  mocktail: ^1.0.2
  nanoid: ^1.0.0
  package_info_plus: ^8.0.2
  path_provider: ^2.1.1
  percent_indicator: ^4.2.3
  permission_handler: ^11.0.1
  pinput: ^5.0.1
  pointycastle: ^3.7.3
  pull_to_refresh_flutter3: ^2.0.2
  qr_flutter: ^4.1.0
  reactive_forms: ^17.0.1
  restart_app: ^1.2.1
  riverpod_annotation: ^2.1.1
  rxdart: ^0.27.7
  share_plus: ^10.0.2
  shared_preferences: ^2.2.0
  skeletonizer: ^1.0.1
  talker_flutter: ^4.4.1
  talker_riverpod_logger: ^4.4.1
  ui_components:
    path: packages/ui_components/
  url_launcher: ^6.1.12
  web_socket_channel: ^3.0.1
  webview_flutter: ^4.2.2
  #[window_manager] has to be pinned because newer versions have conflict
  #with Colors from newer version of flutter
  window_manager: 0.4.3
  jwt_decoder: ^2.0.1
  lwk: ^0.2.2

dev_dependencies:
  build_runner: ^2.4.6
  chopper_generator: ^7.4.0
  envied_generator: ^1.0.0
  ffigen: ^11.0.0
  flutter_gen_runner: ^5.8.0
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.2
  flutter_test:
    sdk: flutter
  freezed: ^2.4.1
  integration_test:
    sdk: flutter
  isar_generator: ^3.1.0+1
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.3
  riverpod_lint: ^2.1.1
  test: ^1.25.2

dependency_overrides:
  http: ^0.13.5
  freezed_annotation: ^2.4.1
  archive: ^4.0.5
  test_api: 0.7.0 # Force flutter_test compatible version
  test: 1.25.2 # Use recent version
  web_socket_channel: ^3.0.1 # Force the version we want to keep
  analyzer: ^5.0.0 # Compatible with isar_generator
  shelf_web_socket: ^2.0.0 # Compatible with web_socket_channel ^3.0.1
  meta: 1.15.0 # Compatible with lwk ^0.2.2 and integration_test

global_options:
  freezed:freezed:
    runs_before:
      - isar:isar_generator

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/svgs/
    - assets/svgs/dark/
    - assets/svgs/light/
    - assets/svgs/success_illustrations/
    - assets/asset_icons/
    - assets/animations/
    - assets/fonts/
    - assets/fonts/helvetica/
    - assets/fonts/dm_sans/
    - assets/icon/
    - assets/marketplace/
    - assets/flags/
    - assets/raw/
    - assets/images/
  fonts:
    - family: HelveticaNeue
      fonts:
        - asset: assets/fonts/helvetica/HelveticaNeue-Medium.otf
        - asset: assets/fonts/helvetica/HelveticaNeue-Thin.otf
          weight: 100
        - asset: assets/fonts/helvetica/HelveticaNeue-UltraLight.otf
          weight: 200
        - asset: assets/fonts/helvetica/HelveticaNeue-Light.otf
          weight: 300
        - asset: assets/fonts/helvetica/HelveticaNeue-Regular.otf
          weight: 400
        - asset: assets/fonts/helvetica/HelveticaNeue-Bold.otf
          weight: 700
        - asset: assets/fonts/helvetica/HelveticaNeue-Heavy.otf
          weight: 800
        - asset: assets/fonts/helvetica/HelveticaNeue-Black.otf
          weight: 900
    - family: DMSans
      fonts:
        - asset: assets/fonts/dm_sans/DMSans-Medium.ttf
        - asset: assets/fonts/dm_sans/DMSans-MediumItalic.ttf
          style: italic
        - asset: assets/fonts/dm_sans/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/dm_sans/DMSans-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/dm_sans/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/dm_sans/DMSans-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/dm_sans/DMSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/dm_sans/DMSans-BoldItalic.ttf
          weight: 700
          style: italic
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/inter/Inter-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/inter/Inter-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/inter/Inter-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/inter/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/inter/Inter-BoldItalic.ttf
          weight: 700
          style: italic
    - family: RobotoMono
      fonts:
        - asset: packages/ui_components/assets/fonts/roboto_mono/RobotoMono-Regular.ttf
          weight: 400
        - asset: packages/ui_components/assets/fonts/roboto_mono/RobotoMono-Medium.ttf
          weight: 500
        - asset: packages/ui_components/assets/fonts/roboto_mono/RobotoMono-SemiBold.ttf
          weight: 600
    - family: FiraMono
      fonts:
        - asset: packages/ui_components/assets/fonts/fira_mono/FiraMono-Medium.ttf
          weight: 500

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.jpg"
  remove_alpha_channel_ios: true
  adaptive_icon_background: "#00C7F9"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.jpg"
  macos:
    generate: true
    image_path: "assets/icon/app_icon.jpg"
  # Linux is not supported by flutter_launcher_icons yet
  # Add the app_icon.jpg files to linux/ manually which is prone to errors
  # or wait for this PR to be merged: https://github.com/fluttercommunity/flutter_launcher_icons/pull/647
  # or we should migrate to this package: https://pub.dev/packages/launcher_icon which supports all platforms

flutter_native_splash:
  color: "#00C7F9"
  image: assets/icon/splash.png
  android_12:
    image: assets/icon/splash.png
    color: "#00C7F9"
  android_gravity: center
  ios_content_mode: scaleAspectFit

flutter_gen:
  integrations:
    flutter_svg: true
    flare_flutter: true
    rive: true
    lottie: true
  assets:
    enabled: true
    outputs:
      class_name: UiAssets
      package_parameter_enabled: false
    inputs:
      - assets/animations/
  fonts:
    enabled: true
    outputs:
      class_name: UiFontFamily

ffigen:
  output: "lib/ffi/generated_bindings.dart"
  headers:
    entry-points:
      - "crypto/gdk/include/gdk/gdk.h"
      - "boltz-rust/bindings.h"
  include-directories:
    - "/usr/include"
    - "/usr/local/include"
  typedefs:
    include:
      - ".*"
  functions:
    expose-typedefs:
      include:
        - ".*"
  symbol-address:
    include:
      - ".*"
  structs:
    exclude:
      - "(.*)sigaction(.*)"
  unions:
    exclude:
      - "(.*)sigaction(.*)"
  llvm-path:
    - "/nix/store/wxxgsgjxbnkkyczgf8lkbfrsqiywm8bi-clang-17.0.6-lib"
    - "/opt/local/libexec/llvm-10"
    - "/Library/Developer/CommandLineTools/usr"
    - "\\opt\\llvm"
    - "/usr/lib/llvm-18/lib/libclang.so"
