include: ../../analysis_options.yaml

analyzer:
  exclude:
    - "lib/ffi/**"
    - "lib/gen/**"
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "flutter/**"
    - "packages/**/"
  errors:
    sdk_version_since: ignore
    invalid_annotation_target: ignore
    deprecated_member_use_from_same_package: ignore
